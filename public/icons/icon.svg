<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Dumbbell icon -->
  <g fill="white" transform="translate(128, 180)">
    <!-- Left weight -->
    <rect x="0" y="20" width="40" height="80" rx="8"/>
    <rect x="0" y="40" width="20" height="40" rx="4"/>
    <!-- Bar -->
    <rect x="40" y="55" width="160" height="10" rx="2"/>
    <!-- Right weight -->
    <rect x="200" y="20" width="40" height="80" rx="8"/>
    <rect x="220" y="40" width="20" height="40" rx="4"/>
  </g>
  <!-- Text -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">FitPlan</text>
</svg>